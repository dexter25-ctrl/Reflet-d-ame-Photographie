<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photographer Portfolio</title>
  
  <!-- Google Fonts: Bodoni Moda for elegant serif headings, Inter for clean sans-serif body text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,ital,wght@6..96,400;6..96,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Grain overlay for vintage texture -->
  <div class="grain-overlay"></div>

  <!-- Navigation -->
  <header class="navbar">
    <div class="logo">
      <h1>Aperture.</h1>
    </div>
    <nav class="nav-links">
      <ul>
        <li><a href="#archive">Archive</a></li>
        <li><a href="#stories">Stories</a></li>
        <li><a href="#prints">Prints</a></li>
        <li><a href="#about">À propos</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <section class="hero">
      <div class="hero-layout">
        <div class="hero-image-container">
          <div class="film-strip-border top"></div>
          <div class="hero-image-wrapper">
            <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=2788&auto=format&fit=crop" alt="Soulful portrait" class="hero-portrait">
          </div>
          <div class="film-strip-border bottom"></div>
        </div>
        <div class="hero-text-content">
          <p class="small-text primary">Aperture. Echoes in Silver Gelatin. Éditorial, narration visuelle avec une âme nostalgique.</p>
          <p class="small-text secondary">Basé à Paris, disponible pour projets mondiaux.</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
